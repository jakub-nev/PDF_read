name: Build macOS app

# Builds a standalone "Kontrola skla.app" (wrapped in a .dmg) as an Intel
# (x86_64) binary, on the fast Apple Silicon runner via Rosetta 2. We install
# the universal2 Python from python.org and force every step through
# `arch -x86_64`, so PyInstaller bundles x86_64 binaries. A hard arch check
# fails the job if the interpreter is not actually x86_64 (avoids producing a
# green-but-arm64 artifact). An x86_64 app runs natively on Intel Macs and on
# Apple Silicon via Rosetta, so this single binary covers every Mac.
#
# Download the result from the run's Artifacts section.

env:
  PYTHON_VERSION: "3.12.7"

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "packaging/**"
      - ".github/workflows/build-macos.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build (Intel x86_64)
    runs-on: macos-14   # Apple Silicon runner (fast queue), x86_64 via Rosetta

    steps:
      - uses: actions/checkout@v4

      - name: Install Rosetta 2
        run: softwareupdate --install-rosetta --agree-to-license || true

      - name: Install universal2 Python from python.org
        run: |
          set -euo pipefail
          curl -fL -o /tmp/python.pkg \
            "https://www.python.org/ftp/python/${PYTHON_VERSION}/python-${PYTHON_VERSION}-macos11.pkg"
          sudo installer -pkg /tmp/python.pkg -target /

      - name: Set PY and require x86_64 interpreter
        run: |
          set -euo pipefail
          PY="/Library/Frameworks/Python.framework/Versions/3.12/bin/python3"
          echo "PY=$PY" >> "$GITHUB_ENV"
          ARCH=$(arch -x86_64 "$PY" -c "import platform; print(platform.machine())")
          echo "interpreter arch: $ARCH"
          if [ "$ARCH" != "x86_64" ]; then
            echo "::error::Interpreter is $ARCH, expected x86_64 — aborting to avoid a mislabeled build."
            exit 1
          fi

      - name: Install dependencies (x86_64)
        run: |
          set -euo pipefail
          arch -x86_64 "$PY" -m pip install --upgrade pip
          # PyInstaller is pure-python + universal2 bootloaders -> install normally.
          arch -x86_64 "$PY" -m pip install pyinstaller
          # The python.org interpreter is universal2, so sysconfig reports the
          # platform as "universal2" and a plain `pip install` may pull arm64
          # wheels (e.g. cryptography). Force x86_64-only wheels into an isolated
          # dir and feed them to PyInstaller via PYTHONPATH.
          arch -x86_64 "$PY" -m pip install \
            --platform macosx_10_9_x86_64 \
            --platform macosx_11_0_x86_64 \
            --platform macosx_12_0_x86_64 \
            --only-binary=:all: \
            --target "$RUNNER_TEMP/x86site" \
            pdfplumber openpyxl

      # Tests are not run here: the invoice-parser tests need faktura_sklo.pdf,
      # which is intentionally git-ignored (real invoice data). Run `pytest`
      # locally instead. PyInstaller only needs the source code to build.

      - name: Build .app (x86_64)
        run: |
          set -euo pipefail
          PYTHONPATH="$RUNNER_TEMP/x86site" \
            arch -x86_64 "$PY" -m PyInstaller --noconfirm packaging/glass_check.spec

      - name: Verify the built binary is x86_64
        run: |
          set -euo pipefail
          BIN="dist/Kontrola skla.app/Contents/MacOS/KontrolaSkla"
          file "$BIN"
          file "$BIN" | grep -q "x86_64" || {
            echo "::error::Built binary is not x86_64."; exit 1; }

      - name: Package .dmg
        run: |
          hdiutil create -volname "Kontrola skla" \
            -srcfolder "dist/Kontrola skla.app" \
            -ov -format UDZO "dist/KontrolaSkla-intel.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KontrolaSkla-intel
          path: dist/KontrolaSkla-intel.dmg
          if-no-files-found: error
