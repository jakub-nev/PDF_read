name: Build macOS app

# Builds a standalone "Kontrola skla.app" (wrapped in a .dmg) as an Intel
# (x86_64) binary. We build on the fast, always-available Apple Silicon runner
# using Rosetta 2 + an x86_64 Python, instead of the scarce/slow macos-13 Intel
# runner pool. An x86_64 app runs natively on Intel Macs and on Apple Silicon
# Macs via Rosetta, so this single binary covers every Mac.
#
# Download the result from the run's Artifacts section.

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "packaging/**"
      - ".github/workflows/build-macos.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build (Intel x86_64)
    runs-on: macos-14   # Apple Silicon runner (fast queue)

    steps:
      - uses: actions/checkout@v4

      - name: Install Rosetta 2
        run: softwareupdate --install-rosetta --agree-to-license || true

      - name: Set up x86_64 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64   # x86_64 build, runs under Rosetta on this runner

      - name: Confirm interpreter architecture
        run: python -c "import platform; print('arch:', platform.machine())"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pdfplumber openpyxl pyinstaller

      # Tests are not run here: the invoice-parser tests need faktura_sklo.pdf,
      # which is intentionally git-ignored (real invoice data). Run `pytest`
      # locally instead. PyInstaller only needs the source code to build.

      - name: Build .app
        run: pyinstaller --noconfirm packaging/glass_check.spec

      - name: Package .dmg
        run: |
          hdiutil create -volname "Kontrola skla" \
            -srcfolder "dist/Kontrola skla.app" \
            -ov -format UDZO "dist/KontrolaSkla-intel.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KontrolaSkla-intel
          path: dist/KontrolaSkla-intel.dmg
          if-no-files-found: error
